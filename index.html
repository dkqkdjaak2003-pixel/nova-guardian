    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
        background: #000008;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
      }
      #game-container {
        width: 100%; height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      canvas {
        display: block;
        touch-action: none;
        image-rendering: pixelated;        /* Chrome / Edge / Opera */
        image-rendering: crisp-edges;      /* Firefox */
        image-rendering: -moz-crisp-edges; /* Firefox legacy */
      }

      /* Portrait mode overlay */
      #rotate-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: #000008;
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #00eeff;
        font-family: monospace;
        text-align: center;
        padding: 20px;
      }
      #rotate-overlay .rotate-icon {
        font-size: 64px;
        margin-bottom: 20px;
        animation: rotateAnim 1.8s ease-in-out infinite;
      }
      #rotate-overlay .rotate-title {
        font-size: 18px;
        font-weight: bold;
        letter-spacing: 4px;
        margin-bottom: 10px;
        color: #00eeff;
      }
      #rotate-overlay .rotate-sub {
        font-size: 12px;
        color: #336677;
        letter-spacing: 2px;
      }
      @keyframes rotateAnim {
        0%   { transform: rotate(0deg); }
        40%  { transform: rotate(-90deg); }
        60%  { transform: rotate(-90deg); }
        100% { transform: rotate(0deg); }
      }
      @media (orientation: portrait) and (max-width: 900px) {
        #rotate-overlay { display: flex; }
        #game-container { display: none; }
      }
      @media (orientation: landscape) {
        #rotate-overlay { display: none; }
        #game-container { display: flex; }
      }
    </style>
  </head>
  <body>
    <!-- Portrait mode warning -->
    <div id="rotate-overlay">
      <div class="rotate-icon">📱</div>
      <div class="rotate-title">ROTATE  DEVICE</div>
      <div class="rotate-sub">가로 모드로 회전해주세요</div>
    </div>

    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
      
      // Attempt to lock orientation to landscape
      const lockOrientation = async () => {
        try {
          if (screen.orientation && screen.orientation.lock) {
            await screen.orientation.lock('landscape');
          }
        } catch (e) {
          console.warn('Orientation lock failed:', e);
        }
      };

      // Try locking on first touch/click
      document.addEventListener('touchstart', lockOrientation, { once: true });
      document.addEventListener('click', lockOrientation, { once: true });

      // Prevent context menu on long-press (mobile)
      document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
